<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Price Predictor AI</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>🚗 AI Car Price Predictor</h1>
<p>Smart Machine Learning Based Prediction System</p>

<form action="/predict" method="POST">

<!-- Company Name -->
<input type="text" name="car_name" placeholder="Company Name (Make)" required>

<!-- Model -->
<input type="text" name="model" placeholder="Car Model" required>

<!-- Ad ID -->
<input type="text" name="ad_id" pattern="[0-9]{10}" maxlength="10" placeholder="10 Digit Ad ID" required>

<!-- Model Year (CHANGED HERE ONLY) -->
<select name="year" required>
<option value="">Model Year</option>
{% for y in range(2026, 1990, -1) %}
<option value="{{ y }}">{{ y }}</option>
{% endfor %}
</select>

<!-- KM Driven -->
<input type="number" name="kms" placeholder="KM Driven" required>

<!-- Fuel -->
<select name="fuel" required>
<option value="">Fuel Type</option>
<option value="Petrol">Petrol</option>
<option value="Diesel">Diesel</option>
</select>

<!-- Documents -->
<select name="documents" required>
<option value="">Car Documents</option>
<option value="Original">Original</option>
<option value="Not Original">Not Original</option>
</select>

<!-- Assembly -->
<select name="assembly" id="assembly" onchange="toggleCity()" required>
<option value="">Assembly</option>
<option value="Local">Local</option>
<option value="Imported">Imported</option>
</select>

<!-- Transmission -->
<select name="transmission" required>
<option value="">Transmission</option>
<option value="Manual">Manual</option>
<option value="Automatic">Automatic</option>
</select>

<!-- Condition -->
<select name="condition" required>
<option value="">Condition</option>
<option value="Used">Used</option>
<option value="Not Used">Not Used</option>
</select>

<!-- Registration Type -->
<select name="registration_type" id="registration_type" onchange="toggleCity()" required>
<option value="">Registration Type</option>
<option value="Registered">Registered</option>
<option value="Not Registered">Not Registered</option>
</select>

<!-- Registration City -->
<select name="registration_city" id="registration_city" required>
<option value="">Select Registration City</option>

<option>Hyderabad</option>
<option>Chennai</option>
<option>Bangalore</option>
<option>Mumbai</option>
<option>Delhi</option>
<option>Kolkata</option>
<option>Pune</option>
<option>Ahmedabad</option>
<option>Jaipur</option>
<option>Lucknow</option>
<option>Indore</option>
<option>Surat</option>
<option>Visakhapatnam</option>
<option>Vijayawada</option>
<option>Coimbatore</option>
<option>Other</option>

</select>

<button type="submit">Predict Price 🚀</button>

</form>

</div>

<script>
function toggleCity(){

    let assembly = document.getElementById("assembly").value;
    let regType = document.getElementById("registration_type").value;
    let city = document.getElementById("registration_city");

    if(assembly === "Imported" || regType === "Not Registered"){
        city.value = "";
        city.disabled = true;
        city.style.opacity = "0.5";
    } else {
        city.disabled = false;
        city.style.opacity = "1";
    }
}
</script>

</body>
</html>
