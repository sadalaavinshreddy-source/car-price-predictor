<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Price Predictor AI</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>🚗 AI Car Price Predictor</h1>
<p>Smart Machine Learning Based Prediction System</p>

<form action="/predict" method="POST">

<!-- COMPANY NAME -->
<select name="car_name" required>
<option value="">Company Name</option>
<option>Toyota</option>
<option>Honda</option>
<option>Hyundai</option>
<option>Maruti Suzuki</option>
<option>Tata</option>
<option>Mahindra</option>
<option>Ford</option>
<option>Chevrolet</option>
<option>Nissan</option>
<option>Renault</option>
<option>Kia</option>
<option>Volkswagen</option>
<option>Skoda</option>
<option>BMW</option>
<option>Mercedes-Benz</option>
<option>Audi</option>
<option>MG</option>
<option>Jeep</option>
<option>Volvo</option>
<option>Fiat</option>
<option>Land Rover</option>
<option>Lexus</option>
<option>Jaguar</option>
<option>Tesla</option>
<option>Rolls Royce</option>
<option>Bentley</option>
<option>Other</option>
</select>

<!-- MODEL -->
<input type="text" name="model" placeholder="Car Model" required>

<!-- AD ID -->
<input type="text" name="ad_id" pattern="[0-9]{10}" maxlength="10" placeholder="10 Digit Ad ID" required>

<!-- MODEL YEAR -->
<select name="year" required>
<option value="">Model Year</option>
{% for y in range(2026, 1990, -1) %}
<option value="{{ y }}">{{ y }}</option>
{% endfor %}
</select>

<!-- KM DRIVEN -->
<input type="number" name="kms" placeholder="KM Driven" required>

<!-- FUEL -->
<select name="fuel" required>
<option value="">Fuel Type</option>
<option>Petrol</option>
<option>Diesel</option>
</select>

<!-- DOCUMENTS -->
<select name="documents" required>
<option value="">Car Documents</option>
<option>Original</option>
<option>Not Original</option>
</select>

<!-- ASSEMBLY -->
<select name="assembly" id="assembly" onchange="toggleCity()" required>
<option value="">Assembly</option>
<option>Local</option>
<option>Imported</option>
</select>

<!-- TRANSMISSION -->
<select name="transmission" required>
<option>Manual</option>
<option>Automatic</option>
</select>

<!-- CONDITION -->
<select name="condition" required>
<option>Used</option>
<option>Not Used</option>
</select>

<!-- REGISTRATION TYPE -->
<select name="registration_type" id="registration_type" onchange="toggleCity()" required>
<option>Registered</option>
<option>Not Registered</option>
</select>

<!-- REGISTRATION CITY -->
<select name="registration_city" id="registration_city" required>
<option>Hyderabad</option>
<option>Delhi</option>
<option>Mumbai</option>
<option>Bangalore</option>
<option>Chennai</option>
<option>Other</option>
</select>

<button type="submit">Predict Price 🚀</button>

</form>

<!-- RESULT BOX -->
{% if prediction_text %}
<div class="result">
    {{ prediction_text }}
</div>
{% endif %}

</div>

<script>
function toggleCity(){

    let assembly = document.getElementById("assembly").value;
    let reg = document.getElementById("registration_type").value;
    let city = document.getElementById("registration_city");

    if(assembly === "Imported" || reg === "Not Registered"){
        city.disabled = true;
        city.value = "";
    } else {
        city.disabled = false;
    }
}
</script>

</body>
</html>
