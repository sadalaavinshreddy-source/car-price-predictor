<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Price Predictor AI</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>🚗 AI Car Price Predictor</h1>
<p>Smart ML prediction system</p>

<form action="/predict" method="POST">

<!-- Company -->
<input type="text" name="car_name" placeholder="Company Name" required>

<!-- Model -->
<input type="text" name="model" placeholder="Car Model" required>

<!-- Ad ID -->
<input type="text" name="ad_id" pattern="[0-9]{10}" maxlength="10" placeholder="10 Digit Ad ID" required>

<!-- Year -->
<select name="year" required>
<option value="">Select Year</option>
{% for y in range(2026, 1990, -1) %}
<option value="{{ y }}">{{ y }}</option>
{% endfor %}
</select>

<!-- KM -->
<input type="number" name="kms" placeholder="KM Driven" required>

<!-- 🔥 FIXED FUEL -->
<select name="fuel" required>
<option value="">Fuel Type</option>
<option value="Petrol">Petrol</option>
<option value="Diesel">Diesel</option>
</select>

<input type="text" name="registration_city" placeholder="Registration City" required>

<!-- Documents -->
<select name="documents" required>
<option value="">Documents</option>
<option value="Original">Original</option>
<option value="Not Original">Not Original</option>
</select>

<!-- Assembly -->
<select name="assembly" required>
<option value="">Assembly</option>
<option value="Local">Local</option>
<option value="Imported">Imported</option>
</select>

<!-- 🔥 FIXED TRANSMISSION -->
<select name="transmission" required>
<option value="">Transmission</option>
<option value="Manual">Manual</option>
<option value="Automatic">Automatic</option>
</select>

<!-- Condition -->
<select name="condition" required>
<option value="">Condition</option>
<option value="Used">Used</option>
<option value="Not Used">Not Used</option>
</select>

<input type="text" name="seller_location" placeholder="Seller Location" required>

<button type="submit">Predict Price 🚀</button>

</form>

</div>

</body>
</html>
