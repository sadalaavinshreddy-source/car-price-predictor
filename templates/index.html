<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Price Predictor AI</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>🚗 Car Price Predictor AI</h1>
<p>Predict accurate car price using ML model</p>

<form action="/predict" method="POST" onsubmit="showLoader()">

<!-- Company Name -->
<input type="text" name="car_name" placeholder="Company Name (Make)" required>

<!-- Model -->
<input type="text" name="model" placeholder="Car Model" required>

<!-- Ad ID -->
<input type="text" name="ad_id"
placeholder="10 Digit Ad ID"
pattern="[0-9]{10}" maxlength="10" required>

<!-- Year -->
<select name="year" required>
<option value="">Select Year</option>
{% for y in range(2026, 1990, -1) %}
<option value="{{ y }}">{{ y }}</option>
{% endfor %}
</select>

<!-- KM Driven -->
<input type="number" name="kms"
placeholder="KM Driven (10 digit max)"
maxlength="10" required>

<!-- Fuel -->
<select name="fuel" required>
<option value="">Fuel Type</option>
<option>Petrol</option>
<option>Diesel</option>
</select>

<!-- Documents -->
<select name="documents" required>
<option value="">Documents</option>
<option>Original</option>
<option>Not Original</option>
</select>

<!-- Assembly -->
<select name="assembly" required>
<option value="">Assembly</option>
<option>Local</option>
<option>Imported</option>
</select>

<!-- Transmission -->
<select name="transmission" required>
<option value="">Transmission</option>
<option>Manual</option>
<option>Automatic</option>
</select>

<!-- Condition -->
<select name="condition" required>
<option value="">Condition</option>
<option>Used</option>
<option>Not Used</option>
</select>

<!-- Seller Location -->
<input type="text" name="seller_location" placeholder="Seller Location" required>

<button type="submit">Predict Price 🚀</button>

</form>

<div id="loader" class="loader"></div>

{% if prediction %}
<div class="result">
💰 Predicted Price: ₹ {{ prediction }}
</div>
{% endif %}

</div>

<script>
function showLoader(){
document.getElementById("loader").style.display = "block";
}
</script>

</body>
</html>
